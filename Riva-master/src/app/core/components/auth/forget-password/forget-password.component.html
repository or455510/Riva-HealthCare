<!-- Main Layout Container -->
<div class="min-h-screen w-full bg-[#F8F9FB] font-sans flex">

    <!-- Left Section (3D + Decorative Area | Visible on Desktop Only) -->
    <div class="hidden md:flex w-1/2 relative overflow-hidden">

        <!-- Background Gradient -->
        <div class="absolute inset-0 bg-gradient-to-br from-[#E6F0FF] to-[#D1E4FF]"></div>

        <!-- Floating Icon 1 -->
        <div class="absolute top-20 left-20 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm">
            <i class="fa-solid fa-heart-pulse text-[#2D5BFF] text-xl"></i>
        </div>

        <!-- Floating Icon 2 -->
        <div class="absolute top-1/4 right-32 bg-white/70 backdrop-blur-md p-2 rounded-xl shadow-sm">
            <i class="fa-solid fa-user-doctor text-green-500 text-lg"></i>
        </div>

        <!-- Floating Icon 3 -->
        <div class="absolute bottom-40 left-24 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm">
            <i class="fa-solid fa-shield-halved text-orange-400 text-xl"></i>
        </div>

        <!-- 3D Model Section -->
        <div class="relative z-10 flex flex-col items-center justify-center w-full h-full">
            <div class="w-full h-[60%] transform scale-110">
                <spline-viewer url="https://prod.spline.design/RfqAjOnSviCEEX3U/scene.splinecode"></spline-viewer>
            </div>
        </div>

    </div>

    <!-- Right Section (Form Section) -->
    <div class="w-full md:w-1/2 flex flex-col bg-white p-8 md:px-16 justify-center overflow-y-auto">

        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10">
            <img src="/Picture1.png" class="w-20 h-20 object-contain" alt="RIVA Logo">
            <span class="text-2xl font-black text-[#1A2D51] tracking-[0.2em] mt-2">RIVA</span>
        </div>

        <!-- Page Title -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#1A2D51]">Forget Password</h1>
            <p class="text-gray-400 text-sm mt-2">
                Enter your details to reset your password
            </p>
        </div>

        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="w-full max-w-[380px] mx-auto space-y-6">

            <!-- Input Field -->
            <div class="space-y-2">
                <label class="text-[13px] font-semibold text-gray-600 ml-1">
                    Phone Number or Email
                </label>

                <div class="relative w-full">
                    <input type="email" formControlName="email" placeholder="Enter your email" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 text-sm outline-none transition-all shadow-sm">

                    <!-- Input Icon -->
                    <i class="fa-solid fa-mobile-screen absolute right-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                </div>
            </div>

            <!-- Submit Button -->
            <p *ngIf="message" class="text-center text-sm text-red-500">{{ message }}</p>

            <button type="submit" [disabled]="loading" class="w-full bg-[#2D5BFF] text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-[#1A4BFF] hover:-translate-y-0.5 transition-all flex items-center justify-center group disabled:opacity-60">

                <i class="fa-solid fa-paper-plane mr-2 text-[12px] opacity-80"></i>
                {{ loading ? 'Sending...' : 'Send Login Code' }}

            </button>

            <!-- Support Links -->
            <div class="flex items-center justify-center gap-6 mt-10">

                <!-- Call Support -->
                <a href="/contact" class="flex items-center text-[12px] text-gray-500 hover:text-blue-500 transition-colors">
                    <i class="fa-solid fa-headset mr-2 text-blue-400"></i> Call Support
                </a>

                <!-- Help Center -->
                <a href="/contact" class="flex items-center text-[12px] text-gray-500 hover:text-blue-500 transition-colors">
                    <i class="fa-solid fa-circle-info mr-2 text-green-400"></i> Help Center
                </a>

            </div>

            <!-- Footer Text -->
            <p class="text-center text-[12px] text-gray-400 font-medium mt-4">
                <a href="/contact" class="text-blue-500 hover:underline">Need help?</a>
            </p>

        </form>

    </div>

</div>
