<!-- Main Layout Container -->
<div class="min-h-screen w-full bg-[#F8F9FB] font-sans flex overflow-hidden">

    <!-- Left Section (3D Visual Area | Desktop Only) -->
    <div class="hidden md:flex w-1/2 relative overflow-hidden bg-gradient-to-br from-[#E6F0FF] to-[#D1E4FF]">

        <!-- Floating Icon 1 -->
        <div class="absolute top-20 left-20 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm z-20">
            <i class="fa-solid fa-heart-pulse text-[#2D5BFF] text-xl"></i>
        </div>

        <!-- Floating Icon 2 -->
        <div class="absolute top-1/4 right-32 bg-white/70 backdrop-blur-md p-2 rounded-xl shadow-sm z-20">
            <i class="fa-solid fa-user-doctor text-green-500 text-lg"></i>
        </div>

        <!-- Floating Icon 3 -->
        <div class="absolute bottom-40 left-24 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm z-20">
            <i class="fa-solid fa-shield-halved text-orange-400 text-xl"></i>
        </div>

        <!-- 3D Spline Model -->
        <div class="relative w-full h-full flex items-center justify-center">
            <div class="w-full h-[90%] absolute -bottom-[5%] flex items-center justify-center scale-110">
                <spline-viewer url="https://prod.spline.design/RfqAjOnSviCEEX3U/scene.splinecode" class="w-full h-full">
                </spline-viewer>
            </div>
        </div>

    </div>

    <!-- Right Section (Form Area) -->
    <div class="w-full md:w-1/2 flex flex-col bg-white p-8 md:px-16 justify-center overflow-y-auto">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-10">
            <img src="/Picture1.png" class="w-20 h-20 object-contain" alt="RIVA Logo">
            <span class="text-2xl font-black text-[#1A2D51] tracking-[0.2em] mt-2 uppercase">
                RIVA
            </span>
        </div>

        <!-- Title -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-[#1A2D51] lowercase">
                new password
            </h1>
            <p class="text-gray-400 text-sm mt-2 font-medium">
                Create a strong password for your account
            </p>
        </div>

        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="w-full max-w-[380px] mx-auto space-y-6">

            <div class="space-y-2">
                <label class="text-[13px] font-semibold text-gray-600 ml-1">
                    New Password
                </label>

                <div class="relative w-full group">
                    <input type="password" formControlName="password" placeholder="new password" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 text-sm outline-none transition-all shadow-sm">

                    <i class="fa-solid fa-mobile-screen absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-blue-400"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[13px] font-semibold text-gray-600 ml-1">Confirm Password</label>
                <input type="password" formControlName="password_confirmation" placeholder="confirm password" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 text-sm outline-none transition-all shadow-sm">
            </div>

            <p *ngIf="message" class="text-center text-sm text-red-500">{{ message }}</p>

            <!-- Submit Button -->
            <button type="submit" [disabled]="loading" class="w-full bg-[#4E89FF] text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-[#2D5BFF] hover:-translate-y-0.5 transition-all flex items-center justify-center disabled:opacity-60">
                {{ loading ? 'Saving...' : 'Save password' }}
            </button>

            <!-- Help Section -->
            <div class="flex flex-col items-center gap-4 mt-12">
                <p class="text-[12px] text-gray-400 font-medium">
                    Need help?
                </p>

                <div class="flex items-center justify-center gap-8">
                    <a href="#" class="flex items-center text-[12px] text-blue-500 font-semibold hover:underline">
                        <i class="fa-solid fa-phone-volume mr-2"></i> Call Support
                    </a>

                    <a href="#" class="flex items-center text-[12px] text-green-500 font-semibold hover:underline">
                        <i class="fa-solid fa-circle-info mr-2"></i> Help Center
                    </a>
                </div>
            </div>

        </form>

    </div>

</div>
