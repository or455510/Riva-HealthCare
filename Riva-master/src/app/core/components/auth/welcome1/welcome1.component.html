<div class="h-screen bg-slate-50 flex flex-col items-center justify-between p-4 md:p-6 overflow-hidden relative">

    <div class="absolute top-[-10%] left-[-10%] w-72 h-72 bg-blue-200/30 rounded-full blur-3xl"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-100/50 rounded-full blur-3xl"></div>

    <div class="z-20 self-start">
        <img src="Picture1.png" class="w-12 md:w-14 drop-shadow-sm hover:scale-105 transition-transform cursor-pointer" />
    </div>

    <div class="flex-1 flex flex-col items-center justify-center z-10 w-full max-w-2xl -mt-8 px-4">

        <div class="relative w-full aspect-square max-w-[220px] sm:max-w-[260px] md:max-w-[280px] flex items-center justify-center transform hover:translate-y-[-5px] transition-transform duration-500">
            <div class="absolute inset-0 bg-gradient-to-b from-blue-400/20 to-transparent rounded-full filter blur-2xl scale-75"></div>

            <spline-viewer url="https://prod.spline.design/RfqAjOnSviCEEX3U/scene.splinecode" class="w-full h-full drop-shadow-2xl">
            </spline-viewer>
        </div>

        <div class="text-center mt-4 space-y-2 animate-fade-in-up">
            <h1 class="text-2xl md:text-4xl font-black text-slate-800 tracking-tight leading-tight">
                Welcome to <span class="text-blue-600">Riva</span>
            </h1>
            <p class="text-slate-500 text-[13px] md:text-base leading-relaxed max-w-[280px] md:max-w-md mx-auto font-medium">
                Your AI-powered health companion. Let's get you registered in just a few steps.
            </p>
        </div>

        <div class="mt-6 w-full max-w-[260px] md:max-w-xs animate-bounce-subtle">
            <button (click)="goToNextPage()" class="w-full bg-slate-900 hover:bg-blue-600 text-white text-sm md:text-base font-bold py-3.5 px-8 rounded-[2rem] shadow-xl shadow-slate-200 hover:shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-3 group">
                Get Started
                <i class="fas fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
            </button>

            <p class="text-center mt-4 text-[12px] md:text-sm text-slate-400">
                Already have an account?
                <span routerLink="/signin" class="text-blue-600 font-bold cursor-pointer hover:underline ml-1">Login</span>
            </p>
        </div>
    </div>

    <div class="z-10 text-[9px] md:text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold mb-2 text-center">
        Powered by RIVA AI System v2.0
    </div>

</div>
