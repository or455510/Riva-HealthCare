<div class="min-h-screen w-full bg-[#F8F9FB] font-sans flex overflow-hidden">

    <!-- ═══ LEFT PANEL ═══ -->
    <div class="hidden md:flex w-1/2 relative overflow-hidden bg-linear-to-br from-[#E6F0FF] to-[#D1E4FF]">
        <div class="absolute top-10 left-10 flex flex-col items-center z-30">
            <img src="/Picture1.png" class="w-24 h-24 object-contain" alt="RIVA Logo">
        </div>
        <div class="absolute top-1/4 right-20 bg-white/70 backdrop-blur-md p-3 rounded-2xl shadow-sm z-20">
            <i class="fa-solid fa-user-doctor text-green-500 text-xl"></i>
        </div>
        <div class="relative z-10 flex flex-col items-center justify-center w-full h-full pt-20">
            <div class="w-full h-[45%] relative">
                <div class="w-full h-[115%] absolute -bottom-[10%] flex items-center justify-center scale-125">
                    <spline-viewer url="https://prod.spline.design/RfqAjOnSviCEEX3U/scene.splinecode" class="w-full h-full"></spline-viewer>
                </div>
            </div>
            <div class="mt-10 bg-white/90 backdrop-blur-sm px-8 py-5 rounded-[2.5rem] shadow-xl border border-white/50 max-w-sm text-center">
                <p class="text-[#1A2D51] text-sm font-semibold leading-relaxed">
                    Welcome to Safia Care! Let's get you registered in just a few steps
                </p>
            </div>
            <div class="flex gap-2 mt-8">
                <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                <div class="w-6 h-2 rounded-full bg-blue-500 transition-all"></div>
            </div>
        </div>
    </div>

    <!-- ═══ RIGHT PANEL ═══ -->
    <div class="w-full md:w-1/2 flex flex-col bg-white p-8 md:px-12 lg:px-24 justify-start overflow-y-auto">
        <div class="w-full max-w-125 mx-auto py-10">

            <!-- Title + Role badge -->
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-xl font-bold text-[#1A2D51]">Profile Account</h2>
                <span class="text-[11px] font-bold px-3 py-1 rounded-full" [ngClass]="isDoctor
                        ? 'bg-green-50 text-green-700 border border-green-200'
                        : isCaregiver
                        ? 'bg-purple-50 text-purple-700 border border-purple-200'
                        : 'bg-blue-50 text-blue-700 border border-blue-200'">
                    {{ isDoctor ? '🩺 Doctor' : isCaregiver ? '🤝 Caregiver' : '🧑‍⚕️ Patient' }}
                </span>
            </div>

            <!-- Alerts -->
            <div *ngIf="errorMessage" class="mb-4 px-4 py-3 bg-red-50 border border-red-100 rounded-2xl text-sm text-red-600 font-medium">
                {{ errorMessage }}
            </div>
            <div *ngIf="successMessage" class="mb-4 px-4 py-3 bg-green-50 border border-green-100 rounded-2xl text-sm text-green-600 font-medium">
                {{ successMessage }}
            </div>

            <form (ngSubmit)="onSubmit()" class="space-y-6">

                <!-- ── Profile Photo ── -->
                <div class="flex items-center gap-6 mb-8">
                    <div class="relative w-20 h-20">
                        <img [src]="profileImageUrl" class="w-20 h-20 rounded-full object-cover border-2 border-blue-100" alt="Profile">
                        <button *ngIf="hasCustomImage" type="button" (click)="clearImage()" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-md transition-all z-10">
                            <i class="fa-solid fa-xmark text-2xs"></i>
                        </button>
                        <div class="absolute -bottom-1 -right-1 bg-white shadow-sm border border-gray-100 p-1.5 rounded-full cursor-pointer hover:bg-gray-50 transition-all" (click)="triggerFileInput()">
                            <i class="fa-solid fa-camera text-2xs text-gray-500"></i>
                        </div>
                    </div>
                    <div>
                        <p class="text-[13px] font-bold text-gray-700">Profile Photo</p>
                        <input type="file" id="profilePhotoInput" accept="image/jpeg,image/png,image/gif,image/jpg" class="hidden" (change)="onFileSelected($event)">
                        <button type="button" class="mt-1 px-4 py-1.5 border border-gray-200 rounded-lg text-[11px] font-bold text-gray-600 hover:bg-gray-50 flex items-center gap-2 transition-all" (click)="triggerFileInput()">
                            <i class="fa-solid fa-upload"></i> Upload New Photo
                        </button>
                    </div>
                </div>

                <!-- ── SHARED: Gender ── -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2 col-span-1">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Gender</label>
                        <div class="relative">
                            <select [(ngModel)]="gender" name="gender" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm appearance-none cursor-pointer">
                                <option value="" disabled>Select</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-xs"></i>
                        </div>
                    </div>

                    <!-- ── PATIENT: Age ── -->
                    <div class="space-y-2" *ngIf="isPatient">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Age</label>
                        <input type="number" [(ngModel)]="age" name="age" placeholder="Ex: 25" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                    </div>

                    <!-- ── DOCTOR: Years of Experience ── -->
                    <div class="space-y-2" *ngIf="isDoctor">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Years of Experience</label>
                        <input type="number" [(ngModel)]="yearsOfExperience" name="yearsOfExperience" placeholder="Ex: 5" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                    </div>

                    <!-- ── CAREGIVER: Years of Experience ── -->
                    <div class="space-y-2" *ngIf="isCaregiver">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Years of Experience</label>
                        <input type="number" [(ngModel)]="yearsOfExperience" name="yearsOfExperience" placeholder="Ex: 3" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                    </div>
                </div>

                <!-- ── PATIENT: Address ── -->
                <div class="space-y-2" *ngIf="isPatient">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Address</label>
                    <input type="text" [(ngModel)]="address" name="address" placeholder="City, Street..." class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                </div>

                <!-- ── PATIENT: Chronic Conditions ── -->
                <div class="space-y-2" *ngIf="isPatient">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Chronic Conditions</label>
                    <div class="relative">
                        <input type="checkbox" id="dropdown-toggle" class="peer hidden">
                        <label for="dropdown-toggle" class="w-full pl-5 pr-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm text-gray-500 flex items-center justify-between cursor-pointer peer-checked:border-blue-400 peer-checked:ring-2 peer-checked:ring-blue-50 transition-all">
                            <span class="font-medium text-gray-700">{{ selectedConditionsText }}</span>
                            <i class="fa-solid fa-chevron-down text-2xs"></i>
                        </label>
                        <div class="absolute z-50 w-full mt-2 bg-white border border-gray-100 rounded-2xl shadow-xl opacity-0 invisible scale-95 origin-top peer-checked:opacity-100 peer-checked:visible peer-checked:scale-100 transition-all duration-200 p-2 space-y-1">
                            <label class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors">
                                <input type="checkbox" [(ngModel)]="conditions.diabetes" name="diabetes" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <span class="text-sm font-medium text-gray-700">Diabetes</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors">
                                <input type="checkbox" [(ngModel)]="conditions.hypertension" name="hypertension" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <span class="text-sm font-medium text-gray-700">Hypertension</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl cursor-pointer transition-colors">
                                <input type="checkbox" [(ngModel)]="conditions.cancer" name="cancer" class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <span class="text-sm font-medium text-gray-700">Cancer</span>
                            </label>
                            <div class="pt-2 border-t border-gray-50">
                                <label for="dropdown-toggle" class="block w-full text-center py-2 text-[11px] font-bold text-blue-600 cursor-pointer hover:underline">Done</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ── DOCTOR: Specialization ── -->
                <div class="space-y-2" *ngIf="isDoctor">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Specialization</label>
                    <div class="relative">
                        <select [(ngModel)]="specialization" name="specialization" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm appearance-none cursor-pointer">
                            <option value="" disabled>Select your specialization</option>
                            <option *ngFor="let s of specializationOptions" [value]="s">{{ s }}</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-xs"></i>
                    </div>
                </div>

                <!-- ── DOCTOR: Fee + Clinic ── -->
                <ng-container *ngIf="isDoctor">
                    <div class="space-y-2">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Consultation Fee (EGP)</label>
                        <input type="number" [(ngModel)]="consultationFee" name="consultationFee" placeholder="Ex: 300" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[12px] font-bold text-gray-700 ml-1">Clinic Address</label>
                        <input type="text" [(ngModel)]="clinicAddress" name="clinicAddress" placeholder="12 Tahrir St, Cairo" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm">
                    </div>
                </ng-container>

                <!-- ── DOCTOR: Available Days ── -->
                <div class="space-y-2" *ngIf="isDoctor">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Available Days</label>
                    <div class="flex flex-wrap gap-2">
                        <button *ngFor="let day of dayOptions" type="button" class="px-4 py-2 rounded-xl text-[12px] font-bold border transition-all" [ngClass]="isDaySelected(day)
                                ? 'bg-[#2D5BFF] text-white border-[#2D5BFF]'
                                : 'bg-gray-50 text-gray-600 border-gray-100 hover:border-blue-200'" (click)="toggleDay(day)">
                            {{ day.slice(0, 3) }}
                        </button>
                    </div>
                </div>

                <!-- ── CAREGIVER: Specialty ── -->
                <div class="space-y-2" *ngIf="isCaregiver">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Specialty</label>
                    <div class="relative">
                        <select [(ngModel)]="specialization" name="specialization" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-purple-100 outline-none transition-all text-sm appearance-none cursor-pointer">
                            <option value="" disabled>Select your specialty</option>
                            <option value="Elderly Care">Elderly Care</option>
                            <option value="Special Needs">Special Needs</option>
                            <option value="Post-Surgery">Post-Surgery Recovery</option>
                            <option value="Child Care">Child Care</option>
                            <option value="Chronic Disease">Chronic Disease Support</option>
                            <option value="Palliative Care">Palliative Care</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-300 pointer-events-none text-xs"></i>
                    </div>
                </div>

                <!-- ── CAREGIVER: Salary ── -->
                <div class="space-y-2" *ngIf="isCaregiver">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">Expected Salary (EGP)</label>
                    <input type="number" [(ngModel)]="salary" name="salary" placeholder="Ex: 3000" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-purple-100 outline-none transition-all text-sm">
                </div>

                <!-- ── SHARED: About ── -->
                <div class="space-y-2">
                    <label class="text-[12px] font-bold text-gray-700 ml-1">
                        {{ isDoctor ? 'Professional Bio' : isCaregiver ? 'About Yourself' : 'About Description' }}
                    </label>
                    <textarea rows="3" [(ngModel)]="description" name="description" [placeholder]="isDoctor ? 'Describe your medical background and expertise...' : isCaregiver ? 'Describe your caregiving experience and skills...' : 'Medical background or personal notes...'"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm resize-none"></textarea>
                </div>

                <!-- ── Buttons ── -->
                <div class="flex gap-4 pt-4">
                    <button type="button" (click)="goBack()" class="w-1/3 bg-black text-white py-4 rounded-2xl font-bold text-sm hover:opacity-90 transition-all active:scale-95">
                        Back
                    </button>
                    <button type="submit" [disabled]="isLoading" class="w-2/3 bg-[#2D5BFF] text-white py-4 rounded-2xl font-bold text-sm shadow-lg shadow-blue-100 hover:bg-[#1A4BFF] transition-all disabled:opacity-60 flex items-center justify-center gap-2 active:scale-95">
                        <svg *ngIf="isLoading" class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                        </svg>
                        {{ isLoading ? 'Saving...' : 'Continue' }}
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>
